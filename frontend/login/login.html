<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFL Digital Solutions — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --green: #00C853;
            --black: #080C0A;
            --surface: #0E1410;
            --surface2: #1A2A1C;
            --border: #1A2A1C;
            --text: #E8F0EA;
            --muted: #5A7A5E;
            --red: #FF3D00;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--black);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 24px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .logo-dot {
            color: var(--green);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        input,
        select {
            width: 100%;
            background: var(--surface2);
            border: 1px solid rgba(42, 58, 44, 1);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            font-family: 'DM Sans', sans-serif;
        }

        input:focus,
        select:focus {
            border-color: var(--green);
        }

        .btn-login {
            background: var(--green);
            color: var(--black);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-login:hover {
            background: #00e564;
        }

        .error-message {
            color: var(--red);
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="logo">
            <span class="logo-dot">●</span> MFL Digital
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Tipo de Acesso</label>
                <select id="role">
                    <option value="client">Painel do Cliente</option>
                    <option value="admin">Administrador MFL</option>
                </select>
            </div>

            <div class="form-group">
                <label>Usuário</label>
                <input type="text" id="username" placeholder="Seu usuário" required>
            </div>

            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" placeholder="Sua senha" required>
            </div>

            <button type="submit" class="btn-login" id="submitBtn">Entrar</button>
            <div class="error-message" id="errorMsg"></div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const role = document.getElementById('role').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');

            btn.textContent = 'Autenticando...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role, username, password })
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    btn.textContent = 'Sucesso!';
                    btn.style.background = '#2196F3';
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 500);
                } else {
                    throw new Error(data.error || 'Erro ao autenticar');
                }
            } catch (e) {
                errorMsg.textContent = '⚠️ ' + e.message;
                errorMsg.style.display = 'block';
                btn.textContent = 'Entrar';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
